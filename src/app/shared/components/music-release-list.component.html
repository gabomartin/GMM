<section class="reveal-delay border-t border-white/10 py-6">
  <div class="space-y-6">
    <div class="flex items-end justify-between gap-4">
      <div>
        <p class="text-xs uppercase tracking-[0.32em] text-[var(--color-accent)]">
          {{ language() === 'en' ? 'Releases' : 'Lanzamientos' }}
        </p>
        <h2 class="mt-3 font-display text-3xl font-semibold text-white sm:text-4xl">
          {{ language() === 'en' ? 'Chronological releases' : 'Lanzamientos en orden cronológico' }}
        </h2>
      </div>
    </div>

    <div class="grid gap-0 border-t border-white/10">
      @for (item of items(); track item.id) {
        <a
          [href]="item.href"
          target="_blank"
          rel="noreferrer"
          class="group grid gap-4 border-b border-white/10 py-5 transition hover:text-[var(--color-accent)] md:grid-cols-[120px_minmax(0,1fr)_auto] md:items-center"
        >
          <div class="text-xs uppercase tracking-[0.24em] text-[var(--color-text-muted)]">
            {{ item.releaseDate }}
          </div>
          <div class="min-w-0">
            <p class="font-display text-2xl text-white transition group-hover:text-[var(--color-accent)]">
              {{ item.title }}
            </p>
            <p class="mt-1 text-sm leading-6 text-[var(--color-text-muted)]">
              {{ item.artists }}
            </p>
          </div>
          <div class="text-xs uppercase tracking-[0.24em] text-[var(--color-text-muted)] md:text-right">
            {{ item.label }}
          </div>
        </a>
      }
    </div>
  </div>
</section>
