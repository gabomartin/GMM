<article [class]="articleClass()">
  <div class="w-full">
    @if (!spotlight()) {
      <div class="mb-4 flex items-end justify-between gap-4 border-t border-white/10 pt-5">
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-[var(--color-accent-soft)]">{{ embed().platform }}</p>
          <h3 class="mt-2 font-display text-3xl text-white">{{ embed().title }}</h3>
          <p class="mt-2 text-sm leading-7 text-[var(--color-text-muted)]">{{ embed().description }}</p>
        </div>
        <a
          [href]="embed().url"
          target="_blank"
          rel="noreferrer"
          class="border-b border-white/30 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-white transition hover:border-[var(--color-accent)] hover:text-[var(--color-accent)]"
        >
          Open
        </a>
      </div>
    }

    @if (safeUrl()) {
      <div [class]="frameClass()">
        <iframe
          [class]="iframeClass()"
          [src]="safeUrl()"
          [title]="embed().title"
          loading="lazy"
          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
    } @else {
      <div class="border border-dashed border-white/15 px-4 py-10 text-center text-sm text-[var(--color-text-muted)]">
        Open on platform to listen or watch.
      </div>
    }

    @if (embed().note && !spotlight()) {
      <p class="mt-3 text-xs uppercase tracking-[0.24em] text-[var(--color-text-muted)]">{{ embed().note }}</p>
    }
  </div>
</article>
