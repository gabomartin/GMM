<section class="reveal py-3 sm:py-4">
  <div class="grid gap-4 lg:grid-cols-[minmax(0,1fr)_auto] lg:items-end">
    <div class="max-w-3xl">
      <h1 class="font-display text-3xl font-semibold leading-[0.95] text-white sm:text-4xl lg:text-5xl">
        {{ title() }}
      </h1>
      @if (summary()) {
        <p class="mt-3 max-w-2xl text-sm leading-6 text-[var(--color-text-muted)] sm:text-base">
          {{ summary() }}
        </p>
      }
    </div>

    @if (ctas().length) {
      <div class="flex flex-wrap gap-3 lg:justify-end">
      @for (cta of ctas(); track cta.href) {
        @if (cta.external) {
          <a
            [href]="cta.href"
            target="_blank"
            rel="noreferrer"
            class="inline-flex items-center gap-2 border-b border-white/30 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-white transition hover:border-[var(--color-accent)] hover:text-[var(--color-accent)]"
          >
            {{ cta.label }}
            <span aria-hidden="true">↗</span>
          </a>
        } @else {
          <a
            [routerLink]="cta.href"
            class="inline-flex items-center gap-2 border-b border-white/30 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-white transition hover:border-[var(--color-accent)] hover:text-[var(--color-accent)]"
          >
            {{ cta.label }}
            <span aria-hidden="true">→</span>
          </a>
        }
      }
      </div>
    }
  </div>
</section>
