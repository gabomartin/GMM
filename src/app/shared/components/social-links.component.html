<section class="reveal-delay border-t border-white/10 py-6">
  <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
    <div class="space-y-3">
      <h2 class="font-display text-2xl text-white">{{ title() }}</h2>
      @if (description()) {
        <p class="max-w-2xl text-sm leading-7 text-[var(--color-text-muted)]">{{ description() }}</p>
      }
    </div>
  </div>

  <div class="mt-6 grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
    @for (link of links(); track link.id) {
      <a
        [href]="link.url"
        target="_blank"
        rel="noreferrer"
        class="border-t border-white/10 py-4 transition hover:border-white/30"
      >
        <p class="text-xs uppercase tracking-[0.28em] text-[var(--color-accent-soft)]">{{ link.platform }}</p>
        <p class="mt-3 text-lg font-semibold text-white">{{ link.label }}</p>
        <p class="mt-1 text-sm text-[var(--color-text-muted)]">{{ link.handle || link.url }}</p>
      </a>
    }
  </div>
</section>
