<header class="sticky top-0 z-30 border-b border-white/10 bg-[rgba(5,5,7,0.82)] backdrop-blur-xl">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="group flex items-center" aria-label="Gabo Martin home">
      <div class="flex flex-col gap-1">
        <img
          src="brand/logos/gabo-martin-logotype-white.svg"
          alt="Gabo Martin"
          class="h-4 w-auto sm:h-[1.1rem]"
        />
        <span class="text-[0.72rem] uppercase tracking-[0.24em] text-[var(--color-text-muted)]">DJ & Producer</span>
      </div>
    </a>

    <nav class="hidden items-center gap-2 lg:flex">
      @for (item of navigationItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-[var(--color-accent)] !text-white hover:!bg-[var(--color-accent)] hover:!text-white"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          class="rounded-full px-4 py-2 text-sm font-medium tracking-[0.08em] text-[var(--color-text-muted)] transition hover:bg-white/8 hover:text-white"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="hidden items-center lg:flex">
      <app-language-toggle />
    </div>

    <button
      type="button"
      class="inline-flex h-11 w-11 cursor-pointer items-center justify-center rounded-full border border-white/10 bg-white/5 text-white transition hover:border-[var(--color-accent)] hover:text-[var(--color-accent)] lg:hidden"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-navigation"
      aria-label="Toggle menu"
    >
      <span class="text-lg">{{ menuOpen() ? '×' : '≡' }}</span>
    </button>
  </div>

  @if (menuOpen()) {
    <div
      id="mobile-navigation"
      class="mobile-menu-panel absolute inset-x-0 top-full border-t border-white/10 bg-[rgba(5,5,7,0.94)] px-4 py-4 shadow-2xl shadow-black/30 backdrop-blur-xl sm:px-6 lg:hidden"
    >
      <nav class="flex flex-col gap-2">
        @for (item of navigationItems(); track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-[var(--color-accent)] !text-white hover:!bg-[var(--color-accent)] hover:!text-white"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            class="mobile-menu-item rounded-2xl px-4 py-3 text-sm font-medium tracking-[0.08em] text-[var(--color-text-muted)] transition hover:bg-white/8 hover:text-white"
            (click)="closeMenu()"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="mt-4">
        <app-language-toggle />
      </div>
    </div>
  }
</header>
