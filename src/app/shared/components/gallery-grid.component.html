<section class="reveal-delay overflow-hidden">
  <div class="relative h-[68vh] min-h-[28rem] overflow-hidden bg-black">
    @for (galleryItem of items(); track galleryItem.id; let index = $index) {
      @if (index === activeIndex() || index === outgoingIndex()) {
        <img
          [src]="galleryItem.src"
          [alt]="alt(galleryItem)"
          (animationend)="index === activeIndex() ? onAnimationEnd() : null"
          class="absolute inset-0 h-full w-full object-cover"
          [class.gallery-enter-next]="slideClass(index) === 'gallery-enter-next'"
          [class.gallery-enter-prev]="slideClass(index) === 'gallery-enter-prev'"
          [class.gallery-exit-next]="slideClass(index) === 'gallery-exit-next'"
          [class.gallery-exit-prev]="slideClass(index) === 'gallery-exit-prev'"
        />
      }
    }

    <button
      type="button"
      class="absolute left-4 top-1/2 inline-flex h-11 w-11 -translate-y-1/2 items-center justify-center border border-white/20 bg-black/55 text-2xl leading-none text-white transition duration-300 hover:bg-black/75 hover:scale-105 focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-accent)]"
      (click)="previous()"
      aria-label="Previous photo"
    >
      ‹
    </button>

    <button
      type="button"
      class="absolute right-4 top-1/2 inline-flex h-11 w-11 -translate-y-1/2 items-center justify-center border border-white/20 bg-black/55 text-2xl leading-none text-white transition duration-300 hover:bg-black/75 hover:scale-105 focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-accent)]"
      (click)="next()"
      aria-label="Next photo"
    >
      ›
    </button>
  </div>

  <div class="flex items-center justify-center gap-2 py-4">
    @for (galleryItem of items(); track galleryItem.id; let index = $index) {
      <button
        type="button"
        class="h-2.5 rounded-full transition duration-300"
        [class.w-8]="index === activeIndex()"
        [class.w-2.5]="index !== activeIndex()"
        [class.bg-white]="index === activeIndex()"
        [class.bg-white/35]="index !== activeIndex()"
        (click)="setActive(index)"
        [attr.aria-label]="'Show photo ' + (index + 1)"
        [attr.aria-current]="index === activeIndex() ? 'true' : null"
      ></button>
    }
  </div>
</section>
