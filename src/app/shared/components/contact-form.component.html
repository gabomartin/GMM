<section class="reveal-delay border-t border-white/10 py-6">
  <div class="mb-6 space-y-3">
    <h2 class="font-display text-2xl text-white">{{ labels().title }}</h2>
    <p class="text-sm leading-7 text-[var(--color-text-muted)]">{{ labels().subtitle }}</p>
  </div>

  <form class="grid gap-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid gap-4 md:grid-cols-2">
      <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
        <span>{{ labels().name }} *</span>
        <input formControlName="name" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30" />
      </label>

      <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
        <span>{{ labels().email }} *</span>
        <input formControlName="email" type="email" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30" />
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
        <span>{{ labels().eventDate }}</span>
        <input formControlName="eventDate" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30" />
      </label>

      <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
        <span>{{ labels().location }}</span>
        <input formControlName="location" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30" />
      </label>
    </div>

    @if (serviceOptions().length) {
      <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
        <span>{{ labels().service }}</span>
        <select formControlName="serviceId" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30">
          <option value=""></option>
          @for (service of serviceOptions(); track service.id) {
            <option [value]="service.id">{{ service.title }}</option>
          }
        </select>
      </label>
    }

    <label class="grid gap-2 text-sm text-[var(--color-text-muted)]">
      <span>{{ labels().message }} *</span>
      <textarea formControlName="message" rows="6" class="border border-white/10 bg-black/20 px-4 py-3 text-white outline-none transition focus:border-white/30"></textarea>
    </label>

    @if (submitted() && form.invalid) {
      <p class="text-sm text-[var(--color-accent)]">{{ labels().invalid }}</p>
    }

    <div class="flex flex-wrap items-center gap-3 pt-2">
      <button type="submit" class="border-b border-white/30 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:border-[var(--color-accent)] hover:text-[var(--color-accent)]">
        {{ labels().action }}
      </button>
      <a [href]="mailtoHref()" class="border-b border-white/20 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-[var(--color-text-muted)] transition hover:border-white/40 hover:text-white">
        {{ labels().preview }}
      </a>
    </div>
  </form>
</section>
