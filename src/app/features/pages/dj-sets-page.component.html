<div class="space-y-6">
  <app-hero
    [eyebrow]="page().hero.eyebrow"
    [title]="page().hero.title"
    [summary]="page().hero.summary"
    [ctas]="page().hero.ctas"
  />

  @if (setsEmbed(); as embed) {
    <div class="mt-4">
      <app-media-embed [embed]="embed" />
    </div>
  }

  @if (liveVideoEmbed(); as embed) {
    <div class="border-t border-white/10 pt-8">
      <app-media-embed [embed]="embed" />
    </div>
  }
</div>
