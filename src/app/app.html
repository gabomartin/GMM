<div class="brand-shell flex min-h-screen flex-col bg-[var(--color-bg)] text-[var(--color-text)]">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <picture>
      <source media="(min-width: 768px)" srcset="/brand/background-desktop.jpg" />
      <img
        src="/brand/background-mobile.jpg"
        alt=""
        class="h-full w-full object-cover object-center"
      />
    </picture>
    <div class="absolute inset-0 bg-black/55"></div>
    <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(5,5,7,0.08),rgba(5,5,7,0.9)_76%,#050507)]"></div>
  </div>

  <app-site-header [navigationItems]="navigationItems()" />

  <main class="mx-auto flex w-full max-w-7xl flex-1 flex-col gap-6 px-4 pb-12 pt-0 sm:px-6 sm:pb-14 lg:px-8">
    <router-outlet />
  </main>

  <app-site-footer />
</div>
